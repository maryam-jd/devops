apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-mongo
  labels:
    app: taskflow-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-mongo
  template:
    metadata:
      labels:
        app: taskflow-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:7.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_DATABASE
          value: "tododb"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db
      volumes:
      - name: mongo-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
spec:
  type: ClusterIP
  selector:
    app: taskflow-mongo
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017