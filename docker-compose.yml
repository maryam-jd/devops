version: '3.8'

services:
  app:
    build: .
    image: myapp:FA23-BCS-083
    container_name: myapp-container
    ports:
      - "3001:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/tododb
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: mongo-container
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data: